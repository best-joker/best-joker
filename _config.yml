# ===============================
# 站点信息配置
# ===============================
title: 无敌joker                    # 网站标题
subtitle: 记录生活，分享技术          # 网站副标题  
description: 个人博客，分享编程技术   # 网站描述（用于SEO）
keywords: 博客,编程,技术,生活        # 网站关键词（用于SEO）
author: best-joker                  # 作者名称
language: zh-CN                     # 网站语言
timezone: Asia/Shanghai             # 时区设置

# ===============================
# URL配置
# ===============================
url: http://example.com             # 网站URL（部署时需要修改为实际域名）
permalink: ':year/:month/:day/:title/'  # 文章永久链接格式
permalink_defaults: null            # 永久链接默认值
pretty_urls:                        # 美化URL设置
  trailing_index: true              # 保留index.html后缀
  trailing_html: true               # 保留.html后缀

# ===============================
# 目录配置  
# ===============================
source_dir: source                  # 源文件目录
public_dir: public                  # 生成文件目录
tag_dir: tags                       # 标签目录
archive_dir: archives               # 归档目录
category_dir: categories            # 分类目录
code_dir: downloads/code            # 代码目录
i18n_dir: ':lang'                   # 国际化目录
skip_render: null                   # 跳过渲染的文件

# ===============================
# 文章配置
# ===============================
new_post_name: ':title.md'          # 新文章文件名格式
default_layout: post                # 默认布局
titlecase: false                    # 标题大小写转换（中文博客建议false）
external_link:                      # 外部链接配置
  enable: true                      # 启用外部链接处理
  field: site                       # 处理范围
  exclude: ''                       # 排除的域名
filename_case: 0                    # 文件名大小写（0:不变,1:小写,2:大写）

# ===============================
# 渲染配置
# ===============================
render_drafts: false                # 是否渲染草稿（建议false，避免草稿意外发布）
post_asset_folder: true             # 为每篇文章创建资源文件夹（改为true，方便管理图片）
relative_link: false                # 使用相对链接（建议false，绝对路径更稳定）
future: true                        # 显示未来日期的文章
syntax_highlighter: highlight.js    # 语法高亮器

# ===============================
# 代码高亮配置 (highlight.js)
# ===============================
highlight:
  line_number: true                 # 显示行号
  auto_detect: true                 # 自动检测语言（改为true，提升代码显示效果）
  tab_replace: ''                   # Tab替换字符
  wrap: true                        # 代码换行
  hljs: false                       # 使用hljs样式类（通常保持false）

# ===============================
# 代码高亮配置 (prismjs) - 备用
# ===============================
prismjs:
  preprocess: true                  # 预处理
  line_number: true                 # 显示行号
  tab_replace: ''                   # Tab替换字符

# ===============================
# 首页生成器配置
# ===============================
index_generator:
  path: ''                          # 首页路径
  per_page: 10                      # 每页文章数
  order_by: '-date'                 # 排序方式（按日期倒序）

# ===============================
# 分类和标签配置
# ===============================
default_category: uncategorized     # 默认分类
category_map: null                  # 分类映射
tag_map: null                       # 标签映射

# ===============================
# 其他配置
# ===============================
meta_generator: true                # 生成meta generator标签
date_format: YYYY-MM-DD             # 日期格式
time_format: HH:mm:ss               # 时间格式
updated_option: mtime               # 更新时间选项
per_page: 10                        # 分页每页文章数
pagination_dir: page                # 分页目录
include: []                         # 包含的文件
exclude: []                         # 排除的文件
ignore: null                        # 忽略的文件

# ===============================
# 主题和部署配置
# ===============================
theme: vivia                        # 使用的主题
deploy:                             # 部署配置
  type: ''                          # 部署类型（需要配置具体的部署方式）
